<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="one" markerWidth="14" markerHeight="14" refX="7" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <line x1="7" y1="2" x2="7" y2="12" stroke="#475569" stroke-width="2"/>
    </marker>
    <marker id="many" markerWidth="18" markerHeight="16" refX="14" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,8 L14,2 M2,8 L14,8 M2,8 L14,14" stroke="#475569" stroke-width="2" fill="none"/>
    </marker>
    <style>
      .title { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 14px; fill: #64748b; }
      .entity-name { font-size: 16px; font-weight: 700; fill: #ffffff; }
      .entity-table { font-size: 11px; fill: rgba(255,255,255,0.8); }
      .field { font-size: 13px; fill: #0f172a; font-family: Consolas, monospace; }
      .type { font-size: 12px; fill: #64748b; font-family: Consolas, monospace; }
      .badge { font-size: 10px; font-weight: 700; }
      .rel { font-size: 13px; font-weight: 700; fill: #334155; }
      .rel-note { font-size: 12px; fill: #64748b; }
    </style>
  </defs>

  <rect width="980" height="470" fill="#f8fafc"/>

  <text x="40" y="46" class="title">Data Model</text>
  <text x="40" y="70" class="subtitle">Entities, fields and the relationship between Account and Transaction</text>

  <!-- ACCOUNT ENTITY -->
  <g>
    <rect x="70" y="150" width="300" height="160" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <path d="M70,164 a14,14 0 0 1 14,-14 h272 a14,14 0 0 1 14,14 v32 h-300 z" fill="#4f46e5"/>
    <text x="86" y="180" class="entity-name">Account</text>
    <text x="356" y="180" text-anchor="end" class="entity-table">accounts</text>

    <!-- rows -->
    <rect x="80" y="206" width="20" height="16" rx="4" fill="#fde68a"/>
    <text x="90" y="219" text-anchor="middle" class="badge" fill="#92400e">PK</text>
    <text x="112" y="219" class="field">id</text>
    <text x="356" y="219" text-anchor="end" class="type">Long</text>

    <line x1="80" y1="240" x2="360" y2="240" stroke="#eef2f7"/>
    <text x="112" y="262" class="field">accountNumber</text>
    <text x="356" y="262" text-anchor="end" class="type">String, unique</text>

    <line x1="80" y1="283" x2="360" y2="283" stroke="#eef2f7"/>
    <text x="112" y="304" class="field">balance</text>
    <text x="356" y="304" text-anchor="end" class="type">BigDecimal</text>
  </g>

  <!-- TRANSACTION ENTITY -->
  <g>
    <rect x="610" y="120" width="320" height="228" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <path d="M610,134 a14,14 0 0 1 14,-14 h292 a14,14 0 0 1 14,14 v32 h-320 z" fill="#0d9488"/>
    <text x="626" y="150" class="entity-name">Transaction</text>
    <text x="916" y="150" text-anchor="end" class="entity-table">transactions</text>

    <!-- rows -->
    <rect x="620" y="176" width="20" height="16" rx="4" fill="#fde68a"/>
    <text x="630" y="189" text-anchor="middle" class="badge" fill="#92400e">PK</text>
    <text x="652" y="189" class="field">id</text>
    <text x="916" y="189" text-anchor="end" class="type">Long</text>

    <line x1="620" y1="210" x2="920" y2="210" stroke="#eef2f7"/>
    <text x="652" y="231" class="field">type</text>
    <text x="916" y="231" text-anchor="end" class="type">DEPOSIT | WITHDRAWAL</text>

    <line x1="620" y1="252" x2="920" y2="252" stroke="#eef2f7"/>
    <text x="652" y="273" class="field">amount</text>
    <text x="916" y="273" text-anchor="end" class="type">BigDecimal</text>

    <line x1="620" y1="294" x2="920" y2="294" stroke="#eef2f7"/>
    <text x="652" y="315" class="field">createdAt</text>
    <text x="916" y="315" text-anchor="end" class="type">LocalDateTime</text>

    <line x1="620" y1="336" x2="920" y2="336" stroke="#eef2f7"/>
    <rect x="620" y="324" width="20" height="16" rx="4" fill="#bae6fd"/>
    <text x="630" y="337" text-anchor="middle" class="badge" fill="#075985">FK</text>
    <text x="652" y="337" class="field">account_id</text>
    <text x="916" y="337" text-anchor="end" class="type">Long -&gt; accounts.id</text>
  </g>

  <!-- RELATIONSHIP -->
  <path d="M370,219 H490 V232 H610" fill="none" stroke="#475569" stroke-width="2" marker-start="url(#one)" marker-end="url(#many)"/>
  <text x="404" y="210" class="rel">1</text>
  <text x="578" y="224" class="rel">N</text>

  <!-- LEGEND -->
  <g>
    <rect x="70" y="384" width="500" height="56" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="88" y="408" class="rel" fill="#0f172a">Relationship (1 : N)</text>
    <text x="88" y="428" class="rel-note">One Account has many Transactions. Each Transaction belongs to exactly one Account</text>
    <text x="88" y="444" class="rel-note">through the foreign key account_id (JPA: Transaction @ManyToOne -&gt; Account).</text>
  </g>
</svg>
